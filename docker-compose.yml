services:
  constructor:
    build:
      context: .
      dockerfile: Dockerfile
    extra_hosts:
      - "devsql:10.10.129.117"
    ports:
      - "3400:3000"
    # Bind mount must be readable/writable by container user nextjs (UID 1001), e.g.:
    #   sudo chown -R 1001:1001 ./data
    volumes:
      - ./data:/app/data
    environment:
      # Database
      DB_SERVER: ${DB_SERVER}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: ${DB_PORT:-1433}
      DB_ENCRYPT: ${DB_ENCRYPT:-false}
      DB_TRUST_CERT: ${DB_TRUST_CERT:-true}
      # AI
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL}
      # ML-agent OSAGO backend
      OSAGO_AGENT_BASE_URL: ${OSAGO_AGENT_DOCKER_BASE_URL:-http://host.docker.internal:8000}
      OSAGO_AGENT_USERNAME: ${OSAGO_AGENT_USERNAME}
      OSAGO_AGENT_PASSWORD: ${OSAGO_AGENT_PASSWORD}
      OSAGO_AGENT_TIMEOUT_MS: ${OSAGO_AGENT_TIMEOUT_MS:-1200000}
      OSAGO_AGENT_SSE_HEARTBEAT_MS: ${OSAGO_AGENT_SSE_HEARTBEAT_MS:-15000}
      # App
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3400/constructor}
      # Admin / analytics (must be listed here — host .env is not injected implicitly)
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      AGENT_ANALYTICS_ENABLED: ${AGENT_ANALYTICS_ENABLED:-false}
    restart: unless-stopped
